<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-5">
                    <section class="card shadow-lg dice-game-card" aria-label="Dice game panel">
                        <div class="card-body p-4 p-md-5">
                            <h1 class="card-title text-center mb-4">🎲 Dice Roller</h1>
                            <div class="dice-container d-flex justify-content-center gap-3 mb-4">
                                <div id="dice1" class="dice" aria-label="Dice 1">0</div>
                                <div id="dice2" class="dice" aria-label="Dice 2">0</div>
                            </div>
                            <output id="total" class="total-display d-block text-center mb-4" aria-live="polite">Total: 0</output>
                            <button id="rollButton" type="button" class="btn btn-primary btn-lg w-100" aria-label="Roll Dice">
                                🎲 Roll Dice
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
